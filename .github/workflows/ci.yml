name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      AI_PROVIDER: mock
      AUTH_SECRET: ci-auth-secret
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aca?schema=public
      DEV_AUTH_EMAIL: demo@example.com
      DEV_AUTH_PASSWORD: change-me
      E2E_AUTH_EMAIL: demo@example.com
      E2E_AUTH_PASSWORD: change-me
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aca
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aca"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations
        run: npm run db:migrate

      - name: Seed database
        run: npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: E2E smoke
        run: npm run test:e2e
